<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URL Shortener</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 80px auto; padding: 0 20px; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 24px; }
    input { width: 100%; padding: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    button { margin-top: 10px; width: 100%; padding: 10px; background: #111; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    button:hover { background: #333; }
    #result { margin-top: 20px; padding: 14px; background: #f0fdf4; border: 1px solid #86efac; border-radius: 6px; display: none; }
    #result a { font-weight: bold; color: #166534; word-break: break-all; }
    #error { margin-top: 12px; color: red; display: none; font-size: 14px; }
  </style>
</head>
<body>

  <h1>URL Shortener</h1>
  <p>Paste a long URL to get a short link.</p>

  <input type="text" id="urlInput" placeholder="https://example.com/long/url" />
  <button onclick="shorten()">Shorten</button>

  <div id="result">
    Short URL: <a id="shortUrl" href="#" target="_blank"></a>
  </div>
  <div id="error"></div>

  <script>
    const API = 'https://url-shortener-bn1s.onrender.com';

    async function shorten() {
      const url = document.getElementById('urlInput').value.trim();
      document.getElementById('error').style.display = 'none';
      document.getElementById('result').style.display = 'none';

      if (!url) return;

      try {
        const res = await fetch(`${API}/shorten`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ original_url: url })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Something went wrong');

        const shortUrl = data.short_url;

        document.getElementById('shortUrl').textContent = shortUrl;
        document.getElementById('shortUrl').href = shortUrl;
        document.getElementById('result').style.display = 'block';
      } catch (err) {
        document.getElementById('error').textContent = err.message;
        document.getElementById('error').style.display = 'block';
      }
    }

    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') shorten();
    });
  </script>

</body>
</html>
